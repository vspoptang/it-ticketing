<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IT工单系统</title>
    <script src="/static/tailwind.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">🎫 IT工单系统</h1>
            <p class="text-gray-500 mt-2">请登录以继续</p>
        </div>

        {% if error %}
        <div class="px-4 py-3 rounded mb-4 bg-red-100 text-red-700 text-sm">{{ error }}</div>
        {% endif %}

        {% if created %}
        <div class="px-4 py-3 rounded mb-4 bg-green-100 text-green-700 text-sm">
            ✅ 工单 <strong>{{ ticket_ref }}</strong> 提交成功！登录后可查看处理进度。
        </div>
        {% endif %}

        <div class="bg-white rounded-lg shadow-lg p-8">
            <form method="POST" action="/auth/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" name="username" required autofocus
                           placeholder="输入用户名"
                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" name="password" required
                           placeholder="输入密码"
                           class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 text-sm font-medium">
                    登录
                </button>
            </form>
            <div class="border-t border-gray-200 mt-5 pt-4 text-center">
                <a href="/tickets/new"
                   class="inline-block w-full bg-white text-indigo-600 border border-indigo-300 py-2 rounded hover:bg-indigo-50 text-sm font-medium">
                    ➕ 创建工单（无需登录）
                </a>
            </div>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">
            默认管理员: admin / admin123
        </p>
    </div>
</body>
</html>
