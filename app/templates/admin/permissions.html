{% extends "base.html" %}
{% block content %}
<div class="p-8 max-w-3xl">
    <h2 class="text-xl font-bold text-gray-800 mb-2">🔐 状态变更权限表</h2>
    <p class="text-sm text-gray-400 mb-6">修改后即时生效，无需重启</p>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
        <table class="w-full table-fixed">
            <thead class="bg-gray-50">
                <tr>
                    <th class="text-left px-4 py-3 text-sm font-medium text-gray-500 w-1/5">从</th>
                    <th class="text-center px-2 py-3 text-sm font-medium text-gray-500 w-10">→</th>
                    <th class="text-left px-4 py-3 text-sm font-medium text-gray-500 w-1/5">到</th>
                    <th class="text-left px-4 py-3 text-sm font-medium text-gray-500 w-1/3">权限</th>
                    <th class="text-center px-2 py-3 text-sm font-medium text-gray-500 w-16">保存</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for r in rows %}
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-2 text-sm">
                        <span class="inline-block px-2 py-0.5 text-xs rounded-full
                            {% if r.from == 'pending' %}bg-yellow-100 text-yellow-700
                            {% elif r.from == 'in_progress' %}bg-blue-100 text-blue-700
                            {% elif r.from == 'escalated' %}bg-orange-100 text-orange-700
                            {% elif r.from == 'completed' %}bg-green-100 text-green-700
                            {% else %}bg-gray-100 text-gray-600{% endif %}">
                            {{ r.from_label }}
                        </span>
                    </td>
                    <td class="px-2 py-2 text-center text-gray-300 text-xs">→</td>
                    <td class="px-4 py-2 text-sm">
                        <span class="inline-block px-2 py-0.5 text-xs rounded-full
                            {% if r.to == 'pending' %}bg-yellow-100 text-yellow-700
                            {% elif r.to == 'in_progress' %}bg-blue-100 text-blue-700
                            {% elif r.to == 'escalated' %}bg-orange-100 text-orange-700
                            {% elif r.to == 'completed' %}bg-green-100 text-green-700
                            {% else %}bg-gray-100 text-gray-600{% endif %}">
                            {{ r.to_label }}
                        </span>
                    </td>
                    <td class="px-4 py-2">
                        <form action="/admin/permissions/save" method="POST" class="inline-flex items-center gap-2" id="form-{{ r.from }}-{{ r.to }}">
                            <input type="hidden" name="from_status" value="{{ r.from }}">
                            <input type="hidden" name="to_status" value="{{ r.to }}">
                            <select name="permission" class="text-xs border rounded px-2 py-1 bg-white focus:ring-2 focus:ring-indigo-500
                                {% if r.perm == 'admin_only' %}text-red-600 border-red-200
                                {% elif r.perm == 'owner' %}text-indigo-600 border-indigo-200
                                {% else %}text-green-600 border-green-200{% endif %}">
                                <option value="any_staff" {% if r.perm == 'any_staff' %}selected{% endif %}>IT人员（任何人）</option>
                                <option value="owner" {% if r.perm == 'owner' %}selected{% endif %}>指派人</option>
                                <option value="admin_only" {% if r.perm == 'admin_only' %}selected{% endif %}>管理员</option>
                            </select>
                    </td>
                    <td class="px-2 py-2 text-center">
                            <button type="submit" class="text-xs bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700">保存</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="bg-gray-50 rounded-xl p-5 text-sm text-gray-600">
        <h3 class="font-semibold text-gray-700 mb-2">权限级别说明</h3>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <div class="font-medium text-red-600 mb-1">管理员</div>
                <p class="text-xs text-gray-400">仅管理员可执行。如：取消工单、恢复已取消工单。</p>
            </div>
            <div>
                <div class="font-medium text-indigo-600 mb-1">指派人</div>
                <p class="text-xs text-gray-400">仅工单当前指派人可操作。管理员不受此限制。</p>
            </div>
            <div>
                <div class="font-medium text-green-600 mb-1">IT人员（任何人）</div>
                <p class="text-xs text-gray-400">任何 IT 人员均可执行。如：接单、重开工单。</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
