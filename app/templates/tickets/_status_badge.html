<span id="status-badge-{{ ticket.id }}" class="htmx-added" style="animation: flash-bg 0.6s ease-out;">
    {% if ticket.status == 'pending' %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-800 font-medium">⏳ 待处理</span>
    {% elif ticket.status == 'in_progress' %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800 font-medium">🔄 处理中</span>
    {% elif ticket.status == 'escalated' %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-orange-100 text-orange-800 font-medium">⬆️ 已升级</span>
    {% elif ticket.status == 'completed' %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-800 font-medium">✅ 已完成</span>
    {% elif ticket.status == 'cancelled' %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-500 font-medium">❌ 已取消</span>
    {% else %}
    <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-700">{{ ticket.status }}</span>
    {% endif %}
</span>
